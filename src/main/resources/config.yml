settings:
  min-players: 2
  max-players: 2
  countdown-seconds: 10
  ending-seconds: 8
  respawn-seconds: 1
  clear-inventories-on-join: true
  sounds: true
  titles: false
  holograms: false
  setup-holograms: true
  team-chest-holograms: true
  spectators-can-fly: true

lobby: {}

events:
  diamond-tier-seconds: 300
  bed-break-seconds: 600

npc:
  default-skin: Notch
  look-close: true
  look-close-range: 8.0
  solo:
    internal-name: BedWars1v1
    hologram-top: "&bBedWars - %mode%"
    hologram-bottom: "&e%playing% Jogando!"
    hologram-top-height: 2.0
    hologram-bottom-height: 1.74
  item-shop:
    hologram-top: "&b&lLOJA"
    hologram-bottom: "&eClique para abrir"
    hologram-top-height: 1.18
    hologram-bottom-height: 0.9
  upgrade-shop:
    hologram-top: "&b&lMELHORIAS"
    hologram-bottom: "&eClique para abrir"
    hologram-top-height: 1.18
    hologram-bottom-height: 0.9

team-chest-hologram:
  top: "&6&lBAU"
  bottom: "&eClique para guardar"

pre-game-items:
  team-selector:
    slot: 0
    permission: "newbedwars.teamselect"
    name: "&bEscolher Time"
    head-owner-default: "MHF_Question"
    head-owner-red: "MHF_Red"
    head-owner-blue: "MHF_Blue"
    no-permission-message: "%prefix%&cVoce nao tem permissao para escolher o time."
    lore:
      - "&7Escolha a cor desejada"
      - "&7para a partida."
      - ""
      - "&fEscolha atual: %team%"
      - "&7Quem nao escolher vai"
      - "&7para time aleatorio."
      - ""
      - "&eClique para abrir"
  leave-arena:
    slot: 8
    name: "&cVoltar ao Lobby"
    lore:
      - "&7Saia da fila atual"
      - "&7e volte para o lobby."
      - ""
      - "&eClique para sair"

generators:
  iron:
    interval-seconds: 1
    max-nearby-items: 32
  gold:
    interval-seconds: 4
    max-nearby-items: 16
  diamond:
    interval-seconds: 10
    max-nearby-items: 8
  emerald:
    interval-seconds: 15
    max-nearby-items: 8

special-items:
  fireball:
    speed: 2.75
    yield: 2.2
    incendiary: false
    knockback-horizontal: 3.1
    knockback-vertical: 0.8
    knockback-radius: 5.2
    close-distance: 1.85
    far-horizontal: 2.35
    far-vertical: 0.34
    self-horizontal-multiplier: 1.12
    self-vertical-multiplier: 1.08
    max-velocity: 3.95
  tnt:
    fuse-ticks: 40
    yield: 4.0
    incendiary: false
    throw-horizontal: 0.0
    throw-vertical: 0.0
    knockback-horizontal: 2.45
    knockback-vertical: 0.78
    knockback-radius: 5.6
    close-distance: 2.15
    top-radius: 1.15
    top-horizontal: 0.14
    top-vertical: 1.15
    front-horizontal: 2.85
    front-vertical: 0.40
    max-velocity: 3.25
    chain-radius: 3.2
    chain-horizontal: 0.70
    chain-vertical: 0.10
    chain-max-velocity: 0.95
    timer-enabled: true
    timer-format: "%color%%seconds%s"

scoreboard:
  title: "&b&lBEDWARS"
  lobby:
    - "&7%date% | &f%online%"
    - ""
    - "&fModo: &b%mode%"
    - "&fArenas prontas: &a%ready_arenas%"
    - ""
    - "&fnewplugins.com"
  waiting:
    - "&7%date% | &f%online%"
    - ""
    - "&fArena: &b%arena%"
    - "&fJogadores: &a%players%&7/&a%max_players%"
    - "&fMinimo: &a%min_players%"
    - ""
    - "&fnewplugins.com"
  starting:
    - "&7%date% | &f%online%"
    - ""
    - "&fArena: &b%arena%"
    - "&fJogadores: &a%players%&7/&a%max_players%"
    - "&fInicio: &a%countdown%s"
    - "&fSeu time: %team%"
    - ""
    - "&fbedwars.local"
  ingame:
    - "&7%date% | &f%online%"
    - ""
    - "&fProximo evento:"
    - "&b%next_event_name%: &a%next_event_time%"
    - ""
    - "%team_line_red%"
    - "%team_line_blue%"
    - ""
    - "&f%arena%"
    - "&fnewplugins.com"
  ending:
    - "&7%date% | &f%online%"
    - ""
    - "&fArena: &b%arena%"
    - "&fVencedor: %winner%"
    - "&fReinicio: &a%countdown%s"
    - ""
    - "&fnewplugins.com"

tablist:
  enabled: true
  only-ingame: true
  header:
    - "&b&lBEDWARS"
    - "&fModo: &b%mode%"
    - ""
  footer:
    - ""
    - "&fOnline: &b%online%"
    - "&fArena: &b%arena%"
    - "&fStatus: &b%status%"
    - "&fSeu time: %team%"
  player-list:
    lobby:
      order: "90"
      prefix: "&7"
      suffix: ""
    other-arena:
      order: "70"
      prefix: "&7"
      suffix: ""
    same-arena:
      spectator:
        order: "80"
        prefix: "&7[X] &7"
        suffix: ""
      red:
        order: "10"
        prefix: "&c[V] &c"
        suffix: ""
      blue:
        order: "20"
        prefix: "&b[A] &b"
        suffix: ""
      default:
        order: "30"
        prefix: "&f[?] &f"
        suffix: ""
